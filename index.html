                    <p style="font-size:0.78rem;color:rgba(255,255,255,0.5);">Pragya Classes BMR • Dr. Dhanday Sir</p>
                  </div>
                </div>
              </div>
            `).join('')}
          </div>

          <div class="text-center" style="margin-top:var(--space-2xl);">
            <a href="${CONTACT.youtube}" target="_blank" class="btn btn-lg reveal" style="background:red;color:white;box-shadow:0 8px 25px rgba(255,0,0,0.3);">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814z"/><polygon fill="white" points="9.545 15.568 15.818 12 9.545 8.432"/></svg>
              Subscribe करें — 7000+ Free Videos
            </a>
          </div>
        </div>
      </section>

      <!-- TESTIMONIALS -->
      <section class="section" id="testimonials-section">
        <div class="container">
          <div class="section-header reveal">
            <div class="section-label">विद्यार्थी क्या कहते हैं</div>
            <h2 class="section-title">हमारे <span>सफल विद्यार्थी</span></h2>
            <p class="section-desc">हज़ारों विद्यार्थियों ने प्रज्ञा क्लासेज से अपने सपने पूरे किए</p>
          </div>

          <div class="testimonials-track reveal">
            ${TESTIMONIALS.map(t => `
              <div class="testimonial-card">
                <p class="testimonial-text">${t.text}</p>
                <div class="testimonial-author">
                  <div class="testimonial-avatar">${t.avatar}</div>
                  <div>
                    <div class="testimonial-name">${t.name}</div>
                    <div class="testimonial-role">${t.role}</div>
                  </div>
                </div>
                <div style="margin-top:var(--space-md);color:#F59E0B;font-size:0.9rem;">
                  ${'★'.repeat(t.rating)}${'☆'.repeat(5 - t.rating)}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      </section>

      <!-- APP DOWNLOAD CTA -->
      <section class="section" style="background:linear-gradient(135deg, var(--primary), var(--primary-light));" id="app-section">
        <div class="container text-center" style="color:white;">
          <div class="reveal">
            <div style="font-size:3rem;margin-bottom:var(--space-md);">📱</div>
            <h2 style="font-size:2rem;font-weight:800;margin-bottom:var(--space-md);font-family:var(--font-hindi);">
              प्रज्ञा क्लासेज App डाउनलोड करें
            </h2>
            <p style="font-size:1.1rem;opacity:0.8;margin-bottom:var(--space-xl);max-width:500px;margin-left:auto;margin-right:auto;">
              कोर्स, टेस्ट सीरीज़, नोट्स — सब कुछ अपने मोबाइल पर
            </p>
            <div style="display:flex;gap:var(--space-md);justify-content:center;flex-wrap:wrap;">
              <a href="${CONTACT.app}" target="_blank" class="btn btn-lg" style="background:white;color:var(--primary);">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302-2.302 2.302-2.698-2.698 2.698-2.698-.001.001v-.001l.001-.001v.001zM5.864 2.658L16.8 8.991l-2.302 2.302-8.634-8.635z"/></svg>
                Google Play से डाउनलोड
              </a>
              <a href="${getWhatsAppLink()}" target="_blank" class="btn btn-whatsapp btn-lg">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                WhatsApp पर बात करें
              </a>
            </div>
          </div>
        </div>
      </section>

      ${renderFooter()}
      ${renderWhatsAppFab()}
    `;

    // Initialize
    initApp();
    startCountdown(SPECIAL_OFFER.endDate, 'offerCountdown');
  </script>
</body>
</html>
