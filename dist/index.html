  <style>
    /* ---- Enhanced Homepage Styles ---- */
    .faculty-section { padding: 80px 0; background: linear-gradient(180deg, #F0F4FF 0%, #FFFFFF 100%); }
    .faculty-grid { display: flex; justify-content: center; gap: 60px; flex-wrap: wrap; }
    .faculty-card {
      text-align: center; max-width: 340px; position: relative;
      background: white; border-radius: 24px; padding: 40px 30px 30px;
      box-shadow: 0 20px 60px rgba(30, 58, 95, 0.12); transition: transform 0.4s ease, box-shadow 0.4s ease;
    }
    .faculty-card:hover { transform: translateY(-8px); box-shadow: 0 30px 80px rgba(30, 58, 95, 0.18); }
    .faculty-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
      border-radius: 24px 24px 0 0;
    }
    .faculty-card:first-child::before { background: linear-gradient(90deg, #FF6B35, #FF9A6C); }
    .faculty-card:last-child::before { background: linear-gradient(90deg, #1E3A5F, #3B82F6); }
    .faculty-photo {
      width: 180px; height: 180px; border-radius: 50%; object-fit: cover; object-position: top;
      margin: 0 auto 20px; border: 5px solid white;
      box-shadow: 0 10px 40px rgba(30, 58, 95, 0.2);
    }
    .faculty-name { font-size: 1.35rem; font-weight: 800; color: var(--primary); margin-bottom: 6px; font-family: var(--font-hindi); }
    .faculty-role { font-size: 0.88rem; color: var(--accent); font-weight: 600; margin-bottom: 12px; }
    .faculty-bio { font-size: 0.88rem; color: var(--text-secondary); line-height: 1.7; font-family: var(--font-hindi); }
    .faculty-badges { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .faculty-badge {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--primary-bg); color: var(--primary); padding: 6px 14px;
      border-radius: 20px; font-size: 0.78rem; font-weight: 600;
    }

    .youtube-card-enhanced {
      background: var(--bg-dark-card); border-radius: 16px; overflow: hidden; cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative;
    }
    .youtube-card-enhanced:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(0,0,0,0.4); }
    .youtube-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; }
    .youtube-play-overlay {
      position: absolute; top: 0; left: 0; right: 0; aspect-ratio: 16/9;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.25); transition: background 0.3s ease;
    }
    .youtube-card-enhanced:hover .youtube-play-overlay { background: rgba(0,0,0,0.45); }
    .youtube-play-btn {
      width: 64px; height: 46px; background: red; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.3s ease; box-shadow: 0 4px 15px rgba(255,0,0,0.4);
    }
    .youtube-card-enhanced:hover .youtube-play-btn { transform: scale(1.1); }

    /* Trust bar */
    .trust-bar {
      background: white; padding: 30px 0; border-bottom: 1px solid #E8ECF4;
      position: relative; z-index: 2;
    }
    .trust-items { display: flex; justify-content: center; align-items: center; gap: 50px; flex-wrap: wrap; }
    .trust-item { display: flex; align-items: center; gap: 10px; color: var(--text-secondary); font-size: 0.88rem; }
    .trust-icon { font-size: 1.3rem; }

    /* Gradient text shimmer */
    .shimmer-text {
      background: linear-gradient(120deg, #FF6B35, #FFB347, #FF6B35);
      background-size: 200% auto;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s linear infinite;
    }
    @keyframes shimmer { to { background-position: 200% center; } }

    @media (max-width: 768px) {
      .faculty-grid { gap: 25px; }
      .faculty-card { max-width: 100%; padding: 30px 20px 20px; }
      .faculty-photo { width: 140px; height: 140px; }
      .trust-items { gap: 20px; }
    }
  </style>
